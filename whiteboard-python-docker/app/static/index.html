<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Collaborative Whiteboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        canvas {
            border: 1px solid black;
            cursor: crosshair;
            width: 700px;
            height: 450px;
        }
        .container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        .controls {
            border: 1px solid #cccccc;
            padding: 15px;
            width: 260px;
        }
        .status {
            margin-top: 15px;
            font-weight: bold;
        }
        .log {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #cccccc;
            height: 120px;
            overflow-y: auto;
            font-size: 12px;
            background-color: #f8f8f8;
        }
    </style>
</head>
<body>
    <h1>Collaborative Whiteboard App</h1>
    <p>Open this page in two browser tabs. Draw on one tab and observe the result on the other tab.</p>

    <div class="container">
        <canvas id="myCanvas" width="700" height="450"></canvas>

        <div class="controls">
            <h3>Brush Options</h3>
            <form name="inputForm">
                <p><strong>Color</strong></p>
                <label><input type="radio" name="color" value="#FF0000" checked> Red</label><br>
                <label><input type="radio" name="color" value="#0000FF"> Blue</label><br>
                <label><input type="radio" name="color" value="#FF9900"> Orange</label><br>
                <label><input type="radio" name="color" value="#33CC33"> Green</label><br>
                <label><input type="radio" name="color" value="#000000"> Black</label>
                <label><input type="radio" name="color" value="#800080"> Purple</label><br>
                <p><strong>Shape</strong></p>
                <label><input type="radio" name="shape" value="square" checked> Square</label><br>
                <label><input type="radio" name="shape" value="circle"> Circle</label><br>
                <label><input type="radio" name="shape" value="triangle"> Triangle</label>
                <p>
                    <label>
                        <input type="checkbox" id="online" checked>
                        Send drawing to other clients
                    </label>
                </p>

                <button type="button" onclick="clearCanvas()">Clear My Canvas</button>
            </form>

            <div class="status" id="status">Connecting...</div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script src="/static/websocket.js"></script>
    <script src="/static/whiteboard.js"></script>
</body>
</html>
